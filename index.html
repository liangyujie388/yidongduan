<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>谛听·智能反诈客服</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b1220;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: radial-gradient(120% 120% at 0% 0%, #101a2c, #070c18);
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .nav-header {
            flex-shrink: 0;
            background: rgba(10, 18, 30, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(110, 231, 255, 0.2);
            padding: 14px 16px;
            z-index: 10;
        }
        .nav-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6ee7ff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 0;
            scrollbar-width: thin;
        }

        .panel {
            display: none;
            animation: fade 0.2s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            border: 1px solid rgba(110,231,255,0.2);
            padding: 18px;
            margin-bottom: 18px;
        }
        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-left: 3px solid #6ee7ff;
            padding-left: 12px;
        }

        /* 聊天区域 */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 400px;
            background: rgba(0,0,0,0.25);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(110,231,255,0.2);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 90%;
        }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #6ee7ff, #a78bfa);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .message.user .msg-avatar { background: rgba(255,255,255,0.2); }
        .msg-bubble {
            background: rgba(255,255,255,0.08);
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 1.45;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .message.user .msg-bubble {
            background: rgba(110,231,255,0.15);
            border-color: rgba(110,231,255,0.3);
        }

        /* 功能按钮栏（仅主界面显示） */
        .func-bar {
            display: flex;
            justify-content: space-around;
            gap: 6px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
        }
        .func-btn {
            background: rgba(110,231,255,0.1);
            border: 1px solid rgba(110,231,255,0.25);
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            flex: 1;
            text-align: center;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .func-btn.active {
            background: rgba(110,231,255,0.25);
            border-color: #6ee7ff;
            color: #6ee7ff;
        }
        .func-btn:active {
            transform: scale(0.96);
        }

        .chat-input-bar {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            align-items: center;
        }
        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(110,231,255,0.3);
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .icon-btn {
            background: rgba(110,231,255,0.15);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 1.3rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .icon-btn:active { background: rgba(110,231,255,0.4); }
        .voice-active {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .file-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 12px;
        }

        /* 非主界面返回按钮 */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(110,231,255,0.15);
            border: 1px solid rgba(110,231,255,0.3);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #6ee7ff;
            cursor: pointer;
            margin-bottom: 16px;
            transition: 0.1s;
        }
        .back-home-btn:active {
            background: rgba(110,231,255,0.3);
        }

        /* 场景模拟样式 */
        .mode-switch {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }
        .mode-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(110,231,255,0.3);
            border-radius: 40px;
            padding: 10px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }
        .mode-btn.active-mode {
            background: rgba(110,231,255,0.2);
            border-color: #6ee7ff;
            color: #6ee7ff;
        }
        .scenario-quiz {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 18px;
            margin-top: 10px;
        }
        .scenario-text {
            background: #0f1824;
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
            border-left: 3px solid #ffd166;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .opt-item {
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .opt-item.correct {
            background: #2e7d64;
            border-color: #7cf29a;
        }
        .opt-item.wrong {
            background: #aa2e4e;
            border-color: #ff6b6b;
        }
        .scoreboard {
            margin-top: 16px;
            text-align: center;
            font-weight: bold;
            color: #6ee7ff;
        }
        .btn-sm {
            background: rgba(110,231,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            color: white;
            margin-top: 8px;
            cursor: pointer;
        }

        /* 研判举报面板 */
        .input-box {
            width: 100%;
            padding: 12px;
            background: #0f1824;
            border: 1px solid rgba(110,231,255,0.3);
            border-radius: 24px;
            color: white;
            margin-bottom: 12px;
        }
        .risk-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 60px;
            font-weight: bold;
        }
        .low { background: #2e7d6455; color: #7cf29a; }
        .mid { background: #f0a34b55; color: #ffd166; }
        .high { background: #d34f5f55; color: #ff9f9f; }
        .report-history {
            margin-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
        }
        .report-item {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.75rem;
        }

        /* 知识库分类标签 */
        .kb-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .kb-tab-btn {
            background: rgba(110,231,255,0.1);
            border: 1px solid rgba(110,231,255,0.3);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: 0.1s;
        }
        .kb-tab-btn.active {
            background: rgba(110,231,255,0.25);
            border-color: #6ee7ff;
            color: #6ee7ff;
        }
        .kb-category {
            display: none;
        }
        .kb-category.active-category {
            display: block;
        }
        .kb-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 3px solid #6ee7ff;
            cursor: pointer;
        }
        .kb-question {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .kb-answer {
            font-size: 0.85rem;
            color: #ddd;
            margin-top: 10px;
            display: none;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .kb-item.open .kb-answer {
            display: block;
        }
        .kb-answer strong {
            color: #6ee7ff;
        }
        .kb-answer ul, .kb-answer ol {
            padding-left: 1.2rem;
            margin: 6px 0;
        }
        .source {
            font-size: 0.7rem;
            color: #6ee7ffaa;
            margin-top: 6px;
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 6px;
        }

        /* 模拟高风险链接小按钮 */
        .simulate-link {
            display: inline-block;
            background: rgba(255,107,107,0.2);
            border: 1px solid rgba(255,107,107,0.5);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #ff9f9f;
            cursor: pointer;
            margin-left: 8px;
            vertical-align: middle;
            transition: 0.1s;
        }
        .simulate-link:active {
            background: rgba(255,107,107,0.4);
        }
        .judge-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .judge-actions .icon-btn {
            flex: 2;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="nav-header">
        <h1>🛡️ 谛听·智能反诈客服</h1>
    </div>

    <div class="content-area" id="contentArea">
        <!-- 智能客服主界面 -->
        <div id="chatPanel" class="panel active">
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai">
                        <div class="msg-avatar">AI</div>
                        <div class="msg-bubble">👋 你好！我是谛听反诈助手。<br>📢 你可以：<br>• 输入可疑话术<br>• 点击🎙️ 语音输入<br>• 上传截图/视频<br>我会实时分析并给出劝阻建议。</div>
                    </div>
                </div>
                <div class="func-bar" id="funcBar">
                    <button class="func-btn active" data-tab="chat">💬 智能客服</button>
                    <button class="func-btn" data-tab="scene">🎭 场景模拟</button>
                    <button class="func-btn" data-tab="judge">🔍 研判举报</button>
                    <button class="func-btn" data-tab="kb">📖 反诈课堂</button>
                </div>
                <div class="chat-input-bar">
                    <input type="file" id="fileUpload" accept="image/*,video/*" multiple style="display:none">
                    <button class="icon-btn" id="attachBtn">📎</button>
                    <button class="icon-btn" id="voiceBtn">🎙️</button>
                    <input type="text" id="chatInput" class="chat-input" placeholder="描述诈骗场景..." autocomplete="off">
                    <button class="icon-btn" id="sendBtn">➤</button>
                </div>
                <div id="filePreviewArea" class="file-preview"></div>
            </div>
        </div>

        <!-- 场景模拟面板 -->
        <div id="scenePanel" class="panel">
            <div class="back-home-btn" id="backHomeFromScene">← 返回主页</div>
            <div class="card">
                <div class="card-title">🎮 反诈实训场</div>
                <div class="mode-switch">
                    <div id="randomModeBtn" class="mode-btn active-mode">🎲 随机挑战</div>
                    <div id="levelModeBtn" class="mode-btn">🏆 闯关模式</div>
                </div>
                <div id="sceneQuizArea"></div>
                <div id="sceneScore" class="scoreboard">⭐ 积分: 0</div>
            </div>
        </div>

        <!-- 研判举报面板 -->
        <div id="judgePanel" class="panel">
            <div class="back-home-btn" id="backHomeFromJudge">← 返回主页</div>
            <div class="card">
                <div class="card-title">⚡ 研判举报</div>
                <input type="text" id="judgeUrl" class="input-box" placeholder="可疑链接 (URL)">
                <textarea id="judgeText" class="input-box" rows="3" placeholder="粘贴对方话术 / 聊天记录..."></textarea>
                <div class="judge-actions">
                    <button id="doJudgeBtn" class="icon-btn" style="background:#2a3f6e;">🚨 开始研判</button>
                    <span id="simulateHighRiskBtn" class="simulate-link">⚠️ 模拟高风险链接</span>
                </div>
                <div style="margin-top: 12px;">
                    <span id="riskLabel" class="risk-badge low">风险等级: 待检测</span>
                    <div id="signalsList" style="margin-top: 12px; font-size:0.85rem;"></div>
                    <div id="adviceText" class="msg-bubble" style="margin-top: 12px;"></div>
                </div>
                <div id="reportListArea" class="report-history" style="display:none;">
                    <div style="font-weight:bold; margin-bottom:8px;">📋 本地举报记录：</div>
                    <div id="reportList"></div>
                </div>
                <button id="viewReportsBtn" class="btn-sm" style="margin-top:8px;">📋 查看我的举报记录</button>
            </div>
        </div>

        <!-- 反诈课堂面板 -->
        <div id="kbPanel" class="panel">
            <div class="back-home-btn" id="backHomeFromKb">← 返回主页</div>
            <div class="card">
                <div class="card-title">📚 反诈课堂</div>
                <input type="text" id="kbSearch" class="input-box" placeholder="搜索知识...">
                <div class="kb-tabs" id="kbTabs">
                    <button class="kb-tab-btn active" data-cat="hot">🔥 热点时事</button>
                    <button class="kb-tab-btn" data-cat="law">📜 法律法规</button>
                    <button class="kb-tab-btn" data-cat="tips">💡 反诈贴士</button>
                </div>
                <div id="kbCategories">
                    <div class="kb-category active-category" id="cat-hot"></div>
                    <div class="kb-category" id="cat-law"></div>
                    <div class="kb-category" id="cat-tips"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================= 内置 Dify 配置 =======================
    const DIFY_API_KEY = "app-8Tf20Ir34izqzR2haPtcRCnU";
    const DIFY_BASE_URL = "https://api.dify.ai";

    // 本地智能回复引擎（聊天用）
    function getLocalReply(userMessage) {
        const msg = userMessage.toLowerCase();
        if (msg.includes("刷单") || msg.includes("垫付") || msg.includes("兼职") || msg.includes("返利")) {
            return "⚠️ 这是典型的「刷单返利」诈骗！骗子先给小额返利获取信任，再诱导大额垫付，最终拉黑。请立即停止转账，保存证据，拨打110或96110举报。";
        }
        if (msg.includes("安全账户") || msg.includes("涉嫌洗钱") || (msg.includes("公安") && msg.includes("配合"))) {
            return "🚨 冒充公检法诈骗！公检法机关绝不会设立「安全账户」，更不会要求转账。切勿泄露验证码，马上挂断并拨打110核实。";
        }
        if (msg.includes("游戏交易") || msg.includes("皮肤") || msg.includes("私下交易")) {
            return "🎮 游戏交易骗局！骗子发送假担保链接，诱导私下付款。请认准官方平台，拒绝任何外部链接交易。";
        }
        if ((msg.includes("投资") && (msg.includes("高回报") || msg.includes("导师"))) || msg.includes("杀猪盘")) {
            return "📉 虚假投资理财/杀猪盘，承诺稳赚不赔的都是诈骗！请勿投入资金，立即拉黑。";
        }
        if (msg.includes("验证码") || msg.includes("屏幕共享")) {
            return "🔐 绝对不要透露验证码或开启屏幕共享！对方会盗取你的资金。立即挂断并修改密码。";
        }
        if (msg.includes("贷款") || msg.includes("校园贷") || msg.includes("注销")) {
            return "💸 注销校园贷/虚假贷款诈骗，要求缴纳保证金或解冻费都是骗局。任何先收费的都是诈骗。";
        }
        if (msg.includes("你好") || msg.includes("在吗") || msg.includes("hello")) {
            return "你好！我是谛听反诈助手。如果你遇到可疑电话、短信或网友，请告诉我具体内容，我会帮你分析风险。";
        }
        return "收到你的消息。反诈小提示：不要轻易向陌生人转账，不点陌生链接，不透露验证码。如果需要具体分析，请描述一下对方的话术或链接。";
    }

    // Dify 文件上传 & 工作流调用（聊天用）
    async function uploadFileToDify(file, user) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("user", user);
        const response = await fetch(`${DIFY_BASE_URL}/v1/files/upload`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${DIFY_API_KEY}` },
            body: formData
        });
        if (!response.ok) throw new Error(`文件上传失败: ${response.status}`);
        const data = await response.json();
        return data.id;
    }

    async function callDifyWorkflow(text, files = [], moneySent = "未说明") {
        if (!DIFY_API_KEY) throw new Error("无API Key");
        const fileIds = [];
        for (const file of files) {
            try {
                const fid = await uploadFileToDify(file, "mobile_user");
                fileIds.push({ type: "image", transfer_method: "local_file", upload_file_id: fid });
            } catch(e) { console.warn("文件上传失败", e); }
        }
        const payload = {
            inputs: { text: text, money_sent: moneySent, files_user: fileIds },
            response_mode: "blocking",
            user: "mobile_user"
        };
        const response = await fetch(`${DIFY_BASE_URL}/v1/workflows/run`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${DIFY_API_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.message || "调用失败");
        const answer = result?.data?.outputs?.answer || result?.data?.outputs?.text || result?.answer || null;
        if (!answer) throw new Error("工作流未返回有效内容");
        return answer;
    }

    // ---------- 聊天界面 ----------
    let currentFiles = [];
    const chatMessagesDiv = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const attachBtn = document.getElementById("attachBtn");
    const fileUpload = document.getElementById("fileUpload");
    const previewArea = document.getElementById("filePreviewArea");

    function appendMessage(role, text, filesPreview = []) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        let avatar = role === "ai" ? "AI" : "我";
        let bubbleContent = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble">${text.replace(/\n/g, "<br>")}</div>`;
        if (filesPreview.length && role === "user") {
            let fileHtml = '<div style="margin-top:6px; display:flex; gap:6px;">';
            filesPreview.forEach(f => {
                if (f.type.startsWith("image/")) fileHtml += `<img src="${f.preview}" style="width:50px;height:50px;border-radius:8px;">`;
                else fileHtml += `<span>📄 ${f.name}</span>`;
            });
            fileHtml += "</div>";
            bubbleContent = `<div class="msg-avatar">我</div><div class="msg-bubble">${text}<br>${fileHtml}</div>`;
        }
        msgDiv.innerHTML = bubbleContent;
        chatMessagesDiv.appendChild(msgDiv);

    function analyzeRisk(url, content) {
        let text = (url + " " + content).toLowerCase(), signals = [], total = 0;
        if (/(刷单|垫付|解冻|保证金|做任务|返利)/.test(text)) { total += 35; signals.push("刷单返利特征"); }
        if (/(安全账户|涉嫌洗钱|保密案件|公检法|屏幕共享)/.test(text)) { total += 40; signals.push("冒充公检法/安全账户"); }
        if (/(验证码|影响征信|冻结|最后期限)/.test(text)) { total += 20; signals.push("紧迫威胁/验证码诱导"); }
        if (/http:\/\//.test(text)) { total += 15; signals.push("外部链接"); }
        let riskLevel = total >= 60 ? "高" : (total >= 30 ? "中" : "低");
        let advice = riskLevel === "高" ? "⚠️ 极高风险！立即停止操作，报警96110" : (riskLevel === "中" ? "⚠️ 存在可疑点，请勿继续" : "建议保持警惕，官方渠道核实");
        return { riskLevel, signals, advice };
    }

    function performJudge(url, text) {
        const { riskLevel, signals, advice } = analyzeRisk(url, text);
        const riskEl = document.getElementById("riskLabel");
        riskEl.innerText = `风险等级: ${riskLevel}`;
        riskEl.className = `risk-badge ${riskLevel === "高" ? "high" : (riskLevel === "中" ? "mid" : "low")}`;
        document.getElementById("signalsList").innerHTML = signals.map(s => `⚠️ ${s}`).join("<br>") || "✅ 无明显风险信号";
        document.getElementById("adviceText").innerHTML = advice;
        if (riskLevel === "高") {
            if (confirm("⚠️ 经研判当前内容风险等级为【高】，建议立即举报！\n是否前往公安部网络违法犯罪举报网站（https://cyberpolice.mps.gov.cn）？")) {
                window.open("https://cyberpolice.mps.gov.cn", "_blank");
            }
        }
    }

        { title: "🔹 验证码可以给对方吗？", content: "绝对不能！验证码=账号钥匙。警察、客服永远不会索要验证码。已泄露请立即冻结银行卡，修改密码，拨打96110。" },
        { title: "🔸 收到可疑链接怎么办？", content: "不点、不填、立即删除。已误点请关闭网页，卸载陌生APP，修改支付密码。举报可拨打96110。" }
    ];

    function renderCategory(catId, data, isLaw = false) {
        const container = document.getElementById(catId);
        if (!container) return;
        let html = '';
        data.forEach(item => {
            let content = item.content || "";
            if (isLaw) content = content.replace(/\n/g, "<br>");
            html += `
                <div class="kb-item">
                    <div class="kb-question">${item.title}</div>
                    <div class="kb-answer">${content}</div>
                    ${item.source ? `<div class="source">${item.source}</div>` : ''}
                </div>
            `;
        });
        container.innerHTML = html;
        container.querySelectorAll(".kb-item").forEach(el => {
            el.addEventListener("click", (e) => { e.stopPropagation(); el.classList.toggle("open"); });
        });
    }
    renderCategory("cat-hot", hotNews);
    renderCategory("cat-law", lawItems, true);
    renderCategory("cat-tips", tipsData);

    // 知识库分类切换
    const kbTabBtns = document.querySelectorAll(".kb-tab-btn");
    const kbCategories = document.querySelectorAll(".kb-category");
    function switchKbCategory(catId) {
        kbCategories.forEach(cat => cat.classList.remove("active-category"));
        document.getElementById(`cat-${catId}`).classList.add("active-category");
        kbTabBtns.forEach(btn => {
            if (btn.getAttribute("data-cat") === catId) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }
    kbTabBtns.forEach(btn => {
        btn.addEventListener("click", () => switchKbCategory(btn.getAttribute("data-cat")));
    });
    // 搜索功能
    const kbSearchInput = document.getElementById("kbSearch");
    function filterAllCategories(kw) {
        const keyword = kw.trim().toLowerCase();
        const filter = (data) => data.filter(item => (item.title + (item.content || "") + (item.source || "")).toLowerCase().includes(keyword));
        renderCategory("cat-hot", filter(hotNews));
        renderCategory("cat-law", filter(lawItems), true);
        renderCategory("cat-tips", filter(tipsData));
        const activeCat = document.querySelector(".kb-tab-btn.active")?.getAttribute("data-cat") || "hot";
        switchKbCategory(activeCat);
    }
    kbSearchInput.addEventListener("input", (e) => filterAllCategories(e.target.value));

    // 界面切换逻辑（核心：场景模拟进入时询问是否继续）
    const funcBtns = document.querySelectorAll(".func-btn");
    const panelsMap = {
        chat: "chatPanel",
        scene: "scenePanel",
        judge: "judgePanel",
        kb: "kbPanel"
    };
    function switchTab(tabId) {
        // 切换到场景模拟时，询问是否继续上次答题
        if (tabId === "scene") {
            // 检查是否有进度（任意分数或关卡>0）
            const hasProgress = (randomScore > 0) || (levelScore > 0) || (currentLevel > 0) || (currentQuestion !== null);
            if (hasProgress) {
                const continueGame = confirm("是否继续上次答题？\n点击“确定”继续，点击“取消”重新开始。");
                if (!continueGame) {
                    resetSceneProgress();
                }
            }
        }
        Object.values(panelsMap).forEach(pid => {
            const el = document.getElementById(pid);
            if (el) el.classList.remove("active");
        });
        const activePanel = document.getElementById(panelsMap[tabId]);
        if (activePanel) activePanel.classList.add("active");
        funcBtns.forEach(btn => {
            if (btn.getAttribute("data-tab") === tabId) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        if (tabId === "judge") resetJudgePanel();
        if (tabId === "kb") {
            kbSearchInput.value = "";
            filterAllCategories("");
        }
    }
    funcBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            const tabId = btn.getAttribute("data-tab");
            if (tabId) switchTab(tabId);
        });
    });
    document.getElementById("backHomeFromScene").addEventListener("click", () => switchTab("chat"));
    document.getElementById("backHomeFromJudge").addEventListener("click", () => switchTab("chat"));
    document.getElementById("backHomeFromKb").addEventListener("click", () => switchTab("chat"));

    switchTab("chat");
</script>
